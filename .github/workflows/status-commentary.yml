name: Status commentary

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]

jobs:
  comment-on-status:
    if: startsWith(github.event.label.name, 'status/')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Add status comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
          LABEL: ${{ github.event.label.name }}
        run: |
          if [ "$LABEL" = "status/approved" ]; then
            gh issue comment "$NUMBER" --body "Approved for implementation. Next step: produce or update the implementation guide, keep the change scoped, and move work through the correct layer."
          elif [ "$LABEL" = "status/in-progress" ]; then
            gh issue comment "$NUMBER" --body "Implementation is in progress. Keep the fix bounded, preserve source-of-truth rules, and avoid cross-layer patching."
          elif [ "$LABEL" = "status/blocked" ]; then
            gh issue comment "$NUMBER" --body "This item is blocked. Record the blocker explicitly: missing decision, missing dependency, schema mismatch, or architecture conflict."
          elif [ "$LABEL" = "status/done" ]; then
            gh issue comment "$NUMBER" --body "Marked done. Final check: verify docs, tests, source-of-truth usage, and workflow integrity before closing."
          elif [ "$LABEL" = "status/rejected" ]; then
            gh issue comment "$NUMBER" --body "Rejected. Preserve the rationale in the issue so the team does not reopen the same ambiguity later."
          fi
