name: Repo validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validations and capture logs
        id: validate
        shell: bash
        run: |
          mkdir -p validation

          spec_exit=0
          docs_exit=0
          cases_exit=0
          changeset_exit=0

          python scripts/validate-specs.py > validation/specs.log 2>&1 || spec_exit=$?
          python scripts/validate-docs.py > validation/docs.log 2>&1 || docs_exit=$?
          python scripts/validate-cases.py > validation/cases.log 2>&1 || cases_exit=$?

          if [ -n "${{ steps.diff.outputs.base_sha }}" ] && [ -n "${{ steps.diff.outputs.head_sha }}" ]; then
            python scripts/validate-changeset.py \
              --base "${{ steps.diff.outputs.base_sha }}" \
              --head "${{ steps.diff.outputs.head_sha }}" \
              > validation/changeset.log 2>&1 || changeset_exit=$?
          else
            echo "Changeset validation skipped for this event." > validation/changeset.log
            changeset_exit=0
          fi

          echo "spec_exit=$spec_exit" >> "$GITHUB_OUTPUT"
          echo "docs_exit=$docs_exit" >> "$GITHUB_OUTPUT"
          echo "cases_exit=$cases_exit" >> "$GITHUB_OUTPUT"
          echo "changeset_exit=$changeset_exit" >> "$GITHUB_OUTPUT"

      - name: Render validation report
        run: |
          python scripts/render-validation-report.py \
            --spec-exit "${{ steps.validate.outputs.spec_exit }}" \
            --docs-exit "${{ steps.validate.outputs.docs_exit }}" \
            --cases-exit "${{ steps.validate.outputs.cases_exit }}" \
            --changeset-exit "${{ steps.validate.outputs.changeset_exit }}" \
            --spec-log validation/specs.log \
            --docs-log validation/docs.log \
            --cases-log validation/cases.log \
            --changeset-log validation/changeset.log \
            --out-md validation/report.md \
            --out-json validation/report.json

      - name: Publish job summary
        shell: bash
        run: |
          cat validation/report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-validation-report-${{ github.run_id }}
          path: validation/
          retention-days: 14

      - name: Post or update sticky PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const body = fs.readFileSync("validation/report.md", "utf8");
            const marker = "<!-- validation-report -->";

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated validation comment ${existing.id}`);
            } else {
              const created = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.info(`Created validation comment ${created.data.id}`);
            }

      - name: Fail workflow if validation failed
        shell: bash
        run: |
          if [ "${{ steps.validate.outputs.spec_exit }}" != "0" ] || \
             [ "${{ steps.validate.outputs.docs_exit }}" != "0" ] || \
             [ "${{ steps.validate.outputs.cases_exit }}" != "0" ] || \
             [ "${{ steps.validate.outputs.changeset_exit }}" != "0" ]; then
            echo "One or more validation checks failed."
            exit 1
          fi
