name: Policy guard

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Determine diff range
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run policy guard
        id: guard
        shell: bash
        run: |
          mkdir -p policy

          set +e
          ARGS=()
          if [ -n "${{ steps.diff.outputs.base_sha }}" ] && [ -n "${{ steps.diff.outputs.head_sha }}" ]; then
            ARGS+=(--base "${{ steps.diff.outputs.base_sha }}" --head "${{ steps.diff.outputs.head_sha }}")
          fi

          python scripts/policy-guard.py "${ARGS[@]}" > policy/policy.log 2>&1
          exit_code=$?

          cat policy/policy.log

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "# Policy guard"
            echo
            if [ "${{ steps.guard.outputs.exit_code }}" = "0" ]; then
              echo "✅ PASS"
            else
              echo "❌ FAIL"
            fi
            echo
            echo '```text'
            cat policy/policy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-guard-${{ github.run_id }}
          path: policy/
          retention-days: 14

      - name: Fail workflow if policy guard failed
        shell: bash
        run: |
          if [ "${{ steps.guard.outputs.exit_code }}" != "0" ]; then
            exit 1
          fi
