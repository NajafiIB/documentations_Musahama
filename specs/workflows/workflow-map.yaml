schema_version: "1.0"
last_updated: "2026-03-19"
owner: "Platform Architect"
status: "approved"

workflow_identity:
  name: Musahama Core Workflow
  organization_scoped: true
  primary_path:
    - crm_opportunity
    - mandate
    - research
    - strategy
    - results
    - canonical_promotion
    - downstream_actions

stages:
  - key: crm_opportunity
    module_key: crm_opportunities
    primary_tables: [crm_opportunities]
  - key: mandate
    module_key: mandates
    primary_tables: [mandates, mandate_files, research_constraints]
  - key: research
    module_key: research
    primary_tables: [research, strategies, research_results, research_constraints]
  - key: strategy
    module_key: research
    primary_tables: [strategies]
  - key: results
    module_key: results
    primary_tables: [research_results]
    secondary_read_tables: [companies, contacts, evidence, psych_profiles, lmc_fits, dossiers]
  - key: canonical_promotion
    module_key: results
    primary_tables: [research_results, companies, contacts, evidence, psych_profiles, lmc_fits, dossiers]
  - key: downstream_actions
    module_key: results

transitions:
  - from: crm_opportunity
    to: mandate
    action_key: convert_to_mandate
  - from: mandate
    to: research
    action_key: start_research
  - from: research
    to: strategy
    action_key: generate_or_author_strategies
  - from: research
    to: results
    action_key: produce_candidate_results
  - from: results
    to: canonical_promotion
    action_key: promote_to_canonical
  - from: results
    to: downstream_actions
    action_key: shortlist_export_sync

references:
  docs:
    - docs/workflows/workflows-foundation.md
    - docs/workflows/results-workflow.md
    - docs/workflows/canonical-promotion.md
