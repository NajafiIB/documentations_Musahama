schema_version: "2.2"
last_updated: "2026-04-15"
owner: "Platform Architect"
status: "approved"

canonical_modules:
  - key: dashboard
    route: /dashboard
    kind: utility
    nav_group: platform
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: approvals
    route: /approvals
    kind: utility
    nav_group: platform
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: activity
    route: /activity
    kind: utility
    nav_group: platform
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: origination_match
    route: /origination-match
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: [/mandates, /research, /results]
  - key: supplier_development_program
    route: /supplier-development-program
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: musahama_strategy_management
    route: /musahama-strategy-management
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: false
    legacy_aliases: []
  - key: negotiator
    route: /negotiator
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: false
    legacy_aliases: []
  - key: compliance_guardian
    route: /compliance-guardian
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: false
    legacy_aliases: []
  - key: funding_orchestrator
    route: /funding-orchestrator
    kind: solution
    nav_group: solutions
    show_in_navigation: true
    default_enabled: false
    legacy_aliases: []
  - key: companies
    route: /companies
    kind: utility
    nav_group: shared_data
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: contacts
    route: /contacts
    kind: utility
    nav_group: shared_data
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []
  - key: integrations
    route: /settings/integrations
    kind: utility
    nav_group: shared_data
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: [/integrations]
  - key: data_packs
    route: /settings/data-sources
    kind: utility
    nav_group: shared_data
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: [/data-packs]
  - key: billing
    route: /settings/plan-billing
    kind: utility
    nav_group: admin
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: [/billing]
  - key: settings
    route: /settings
    kind: utility
    nav_group: admin
    show_in_navigation: true
    default_enabled: true
    legacy_aliases: []

legacy_compatibility_modules:
  - key: crm_opportunities
    route: /crm-opportunities
    kind: legacy
    show_in_navigation: false
    route_available: false
  - key: mandates
    route: /mandates
    kind: legacy
    show_in_navigation: false
    route_available: true
  - key: research
    route: /research
    kind: legacy
    show_in_navigation: false
    route_available: true
  - key: results
    route: /results
    kind: legacy
    show_in_navigation: false
    route_available: true

module_local_navigation:
  - module_key: origination_match
    items:
      - path: /origination-match/mandates
        legacy_aliases: [/mandates]
      - path: /origination-match/research
        legacy_aliases: [/research]
      - path: /origination-match/results
        legacy_aliases: [/results]
      - path: /origination-match
        exact: true
  - module_key: supplier_development_program
    items:
      - path: /supplier-development-program/cases
      - path: /supplier-development-program/catalog
      - path: /supplier-development-program/settings
      - path: /supplier-development-program/owner
      - path: /supplier-development-program
        exact: true
  - module_key: musahama_strategy_management
    items:
      - path: /musahama-strategy-management
        exact: true
      - path: /musahama-strategy-management/owner
      - path: /musahama-strategy-management/plan/[planId]
  - module_key: settings
    items:
      - path: /settings
      - path: /settings/workspace
      - path: /settings/solutions
      - path: /settings/integrations
        legacy_aliases: [/integrations]
      - path: /settings/automations
      - path: /settings/data-sources
        legacy_aliases: [/data-packs]
      - path: /settings/usage
      - path: /settings/plan-billing
        legacy_aliases: [/billing]
      - path: /settings/account
      - path: /settings/credit-admin

internal_reference_routes:
  - path: /settings/view-standard
    owner_module: settings
  - path: /settings/delivery-orchestrator
    owner_module: settings

not_modules:
  - key: discovery
  - key: shortlist
  - key: dossiers
  - key: one_pagers
  - key: dataset_releases

references:
  docs:
    - docs/feature-system/module-catalog.md
    - docs/frontend/navigation-rendering.md
