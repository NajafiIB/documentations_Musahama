schema_version: "1.0"
last_updated: "2026-03-19"
owner: "Platform Architect"
status: "approved"

capability_keys:
  - key: strategy_generation
    used_by_features: [research.generate_strategies]
  - key: fit_analysis
    used_by_features: [results.generate_fit]
  - key: dossier_generation
    used_by_features: [results.generate_dossier]
  - key: person_enrichment
    used_by_features: [contacts.enrich_person]
  - key: crm_import
    used_by_features: [crm.sync.import]
  - key: crm_export
    used_by_features: [crm.sync.export]
  - key: external_company_search
    used_by_features: [companies.search_external_source]

providers:
  - provider_key: openai
    category: ai
    capabilities: [strategy_generation, fit_analysis, dossier_generation]
  - provider_key: lusha
    category: enrichment
    capabilities: [person_enrichment]
  - provider_key: crm_connector
    category: crm
    capabilities: [crm_import, crm_export]
  - provider_key: search_provider
    category: search
    capabilities: [external_company_search]

feature_to_capability_map:
  research.generate_strategies: { required_capabilities: [strategy_generation] }
  results.generate_fit: { required_capabilities: [fit_analysis] }
  results.generate_dossier: { required_capabilities: [dossier_generation] }
  contacts.enrich_person: { required_capabilities: [person_enrichment] }
  crm.sync.import: { required_capabilities: [crm_import] }
  crm.sync.export: { required_capabilities: [crm_export] }
  companies.search_external_source: { required_capabilities: [external_company_search] }

provider_state_contract:
  reason_values:
    - ok
    - missing_integration
    - integration_disconnected
    - missing_capability
    - missing_api_key
    - provider_unavailable
    - system_disabled

references:
  docs:
    - docs/feature-system/provider-model.md
    - docs/feature-system/feature-catalog.md
    - docs/services/server-only-and-sensitive-data.md
