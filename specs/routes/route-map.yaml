schema_version: "2.0"
last_updated: "2026-03-29"
owner: "Platform Architect"
status: "approved"

route_groups:
  public:
    routes:
      - path: /login
      - path: /register
      - path: /forgot-password
      - path: /invite/[token]
      - path: /auth/callback
  protected_workspace:
    canonical_routes:
      - path: /dashboard
        module_key: dashboard
      - path: /approvals
        module_key: approvals
      - path: /activity
        module_key: activity
      - path: /origination-match
        module_key: origination_match
      - path: /partner-match
        module_key: partner_match
      - path: /negotiator
        module_key: negotiator
      - path: /compliance-guardian
        module_key: compliance_guardian
      - path: /funding-orchestrator
        module_key: funding_orchestrator
      - path: /companies
        module_key: companies
      - path: /contacts
        module_key: contacts
      - path: /integrations
        module_key: integrations
      - path: /data-packs
        module_key: data_packs
      - path: /billing
        module_key: billing
      - path: /settings
        module_key: settings
    compatibility_routes:
      - path: /mandates
        module_key: origination_match
        compatibility_for: mandates
      - path: /research
        module_key: origination_match
        compatibility_for: research
      - path: /results
        module_key: origination_match
        compatibility_for: results

rules:
  - protected routes require session resolution
  - protected routes require current organization resolution
  - compatibility routes must still resolve to the correct active module in navigation
  - sidebar visibility is not sufficient for security

references:
  docs:
    - docs/frontend/navigation-rendering.md
    - docs/authorization/route-guarding.md
    - docs/auth/routes.md
