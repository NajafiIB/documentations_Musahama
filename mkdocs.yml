site_name: Musahama Developer Docs
site_description: Canonical developer documentation for the Musahama platform.
site_url: https://najafiib.github.io/documentations_Musahama/
repo_url: https://github.com/NajafiIB/documentations_Musahama
repo_name: NajafiIB/documentations_Musahama
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Start Here: dev-guides/start-here.md
  - Architecture:
      - Overview: architecture/overview.md
      - Module Architecture: architecture/module-architecture.md
  - Auth:
      - Foundation: auth/auth-foundation.md
      - Authentication Flow: auth/authentication-flow.md
      - Invitation System: auth/invitation-system.md
      - Onboarding: auth/onboarding.md
      - Route Rules: auth/routes.md
      - User Profile Avatars: auth/user-profile-avatars.md
  - Authorization:
      - Foundation: authorization/authorization-foundation.md
      - Module Access Rules: authorization/module-access-rules.md
      - Route Guarding: authorization/route-guarding.md
      - Role Model: authorization/role-model.md
      - Access Matrix: authorization/access-matrix.md
  - Feature System:
      - Foundation: feature-system/feature-system-foundation.md
      - Module Catalog: feature-system/module-catalog.md
  - Platform Runtime:
      - Runtime Plane: platform-runtime/runtime-plane.md
      - Platform Admin Control Plane: platform-runtime/platform-admin-control-plane.md
  - Data Packs:
      - Data Pack Model: data-packs/data-pack-model.md
  - Database:
      - Foundation: database/database-foundation.md
      - Source of Truth Rules: database/source-of-truth-rules.md
      - Table Reference: database/table-reference.md
      - Schema Overview: database/schema-overview.md
  - Frontend:
      - Foundation: frontend/frontend-foundation.md
      - Workspace Shell: frontend/workspace-shell.md
      - Navigation Rendering: frontend/navigation-rendering.md
      - Current Workspace UI: frontend/current-workspace-ui.md
  - Services:
      - Foundation: services/services-foundation.md
      - Service Directory Map: services/service-directory-map.md
      - Enrichment Architecture: services/enrichment-architecture.md
      - Automations and Support Intake: services/automations-and-support-intake.md
  - Workflows:
      - Foundation: workflows/workflows-foundation.md
      - Origination Match: workflows/origination-match-workflow.md
      - Supplier Development Program: workflows/supplier-development-program-workflow.md
      - Musahama Strategy Management: workflows/musahama-strategy-management-workflow.md
      - Dashboard Recent Work: workflows/dashboard-recent-work.md
      - Legacy CRM Opportunities: workflows/crm-opportunities-workflow.md
      - Legacy Mandates: workflows/mandates-workflow.md
